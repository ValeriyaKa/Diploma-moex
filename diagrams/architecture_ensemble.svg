<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Times New Roman', 'PT Serif', Georgia, serif; }
    .box { fill: #fff; stroke: #000; stroke-width: 1.5; }
    .title { font-size: 13px; font-weight: bold; text-anchor: middle; fill: #000; }
    .label { font-size: 11px; fill: #000; text-anchor: middle; }
    .sm { font-size: 10px; fill: #000; text-anchor: middle; }
    .sl { font-size: 10px; fill: #000; }
    .proto { font-size: 10px; fill: #000; font-style: italic; text-anchor: middle; }
    .w { font-size: 13px; fill: #000; font-weight: bold; font-style: italic; text-anchor: middle; }
    .arr { stroke: #000; stroke-width: 2; fill: none; marker-end: url(#ah); }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- ====== FEATURES ROW ====== -->
  <rect x="30" y="10" width="150" height="50" class="box"/>
  <text x="105" y="32" class="label" style="font-weight:bold;">Технические</text>
  <text x="105" y="48" class="sm">(20 признаков)</text>

  <rect x="195" y="10" width="140" height="50" class="box"/>
  <text x="265" y="32" class="label" style="font-weight:bold;">Сентимент</text>
  <text x="265" y="48" class="sm">(12 признаков)</text>

  <rect x="350" y="10" width="110" height="50" class="box"/>
  <text x="405" y="32" class="label" style="font-weight:bold;">Макро</text>
  <text x="405" y="48" class="sm">(4 признака)</text>

  <rect x="475" y="10" width="130" height="50" class="box"/>
  <text x="540" y="32" class="label" style="font-weight:bold;">Фундамент.</text>
  <text x="540" y="48" class="sm">(11 признаков)</text>

  <!-- Arrows features → models -->
  <line x1="105" y1="60" x2="150" y2="108" class="arr"/>
  <line x1="265" y1="60" x2="150" y2="108" class="arr"/>
  <line x1="265" y1="60" x2="350" y2="108" class="arr"/>
  <line x1="405" y1="60" x2="350" y2="108" class="arr"/>
  <line x1="540" y1="60" x2="350" y2="108" class="arr"/>
  <line x1="405" y1="60" x2="540" y2="108" class="arr"/>
  <line x1="540" y1="60" x2="150" y2="108" class="arr"/>

  <!-- ====== MODEL 1: LightGBM ====== -->
  <rect x="40" y="110" width="210" height="110" class="box"/>
  <text x="145" y="132" class="title">LightGBM</text>
  <line x1="40" y1="138" x2="250" y2="138" stroke="#000" stroke-width="0.5"/>
  <text x="50" y="155" class="sl">Тип: GOSS + EFB</text>
  <text x="50" y="170" class="sl">Признаков: 47</text>
  <text x="50" y="185" class="sl">Optuna: 100 trials</text>
  <text x="50" y="200" class="sl">Walk-Forward CV</text>
  <text x="50" y="215" class="sl">Выход: P(up) ∈ [0, 1]</text>

  <!-- ====== MODEL 2: XGBoost ====== -->
  <rect x="270" y="110" width="200" height="110" class="box"/>
  <text x="370" y="132" class="title">XGBoost</text>
  <line x1="270" y1="138" x2="470" y2="138" stroke="#000" stroke-width="0.5"/>
  <text x="280" y="155" class="sl">Тип: hist-based</text>
  <text x="280" y="170" class="sl">Признаков: 47</text>
  <text x="280" y="185" class="sl">Optuna: 80 trials</text>
  <text x="280" y="200" class="sl">Walk-Forward CV</text>
  <text x="280" y="215" class="sl">Выход: P(up) ∈ [0, 1]</text>

  <!-- ====== MODEL 3: LSTM+Attention (Daily) ====== -->
  <rect x="490" y="110" width="200" height="110" class="box"/>
  <text x="590" y="132" class="title">LSTM + Attention</text>
  <line x1="490" y1="138" x2="690" y2="138" stroke="#000" stroke-width="0.5"/>
  <text x="500" y="155" class="sl">3×LSTM(128), dropout=0.3</text>
  <text x="500" y="170" class="sl">Attention: 128→64→1</text>
  <text x="500" y="185" class="sl">Head: 128→64→32→1</text>
  <text x="500" y="200" class="sl">Daily: 60d × 21 feat</text>
  <text x="500" y="215" class="sl">Выход: Δ% (регрессия)</text>

  <!-- Arrows models → ensemble -->
  <line x1="145" y1="220" x2="280" y2="268" class="arr"/>
  <text x="195" y="254" class="w">w₁ = 0.50</text>

  <line x1="370" y1="220" x2="350" y2="268" class="arr"/>
  <text x="395" y="252" class="w">w₂ = 0.10</text>

  <line x1="590" y1="220" x2="430" y2="268" class="arr"/>
  <text x="530" y="254" class="w">w₃ = 0.40</text>

  <!-- ====== ENSEMBLE ====== -->
  <rect x="180" y="270" width="340" height="50" class="box" style="stroke-width:2;"/>
  <text x="350" y="292" class="title" style="font-size:14px;">Взвешенное среднее</text>
  <text x="350" y="310" class="proto">P = 0.5·LGB + 0.1·XGB + 0.4·σ(LSTM)</text>

  <!-- Arrow ensemble → filter -->
  <line x1="350" y1="320" x2="350" y2="348" class="arr"/>

  <!-- ====== CONFIDENCE FILTER ====== -->
  <rect x="130" y="350" width="440" height="45" class="box"/>
  <text x="350" y="370" class="title" style="font-size:12px;">Фильтр уверенности</text>
  <text x="350" y="388" class="sm">P &gt; 0.56 → BUY  │  P &lt; 0.44 → SELL  │  иначе → HOLD  │  |Δ%| &gt; 0.4%</text>

  <!-- Arrows filter → signals -->
  <line x1="240" y1="395" x2="170" y2="428" class="arr"/>
  <line x1="350" y1="395" x2="350" y2="428" class="arr"/>
  <line x1="460" y1="395" x2="530" y2="428" class="arr"/>

  <!-- ====== OUTPUT SIGNALS ====== -->
  <rect x="100" y="430" width="140" height="40" class="box" style="stroke-width:2;"/>
  <text x="170" y="456" style="font-size:16px; font-weight:bold; text-anchor:middle; fill:#000; font-family:'Times New Roman',serif;">BUY ↑</text>

  <rect x="280" y="430" width="140" height="40" class="box" style="stroke-width:2;"/>
  <text x="350" y="456" style="font-size:16px; font-weight:bold; text-anchor:middle; fill:#000; font-family:'Times New Roman',serif;">HOLD —</text>

  <rect x="460" y="430" width="140" height="40" class="box" style="stroke-width:2;"/>
  <text x="530" y="456" style="font-size:16px; font-weight:bold; text-anchor:middle; fill:#000; font-family:'Times New Roman',serif;">SELL ↓</text>

  <!-- SHAP box -->
  <rect x="590" y="272" width="100" height="40" class="box" style="stroke-dasharray:4 3;"/>
  <text x="640" y="290" class="label" style="font-size:10px; font-weight:bold;">SHAP</text>
  <text x="640" y="304" class="sm" style="font-size:9px;">TreeExplainer</text>
  <line x1="590" y1="292" x2="522" y2="292" class="arr" style="stroke-dasharray:4 3; stroke-width:1.2;"/>
</svg>
