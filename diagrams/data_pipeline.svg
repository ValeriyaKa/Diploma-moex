<svg viewBox="0 0 780 620" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Times New Roman', 'PT Serif', Georgia, serif; }
    .box { fill: #fff; stroke: #000; stroke-width: 1.5; }
    .src { fill: #f5f5f5; stroke: #000; stroke-width: 1.5; rx: 6; }
    .db { fill: #fff; stroke: #000; stroke-width: 2; }
    .title { font-size: 13px; font-weight: bold; text-anchor: middle; fill: #000; }
    .label { font-size: 11px; fill: #000; text-anchor: middle; }
    .sm { font-size: 10px; fill: #000; text-anchor: middle; }
    .sl { font-size: 10px; fill: #000; }
    .arr { stroke: #000; stroke-width: 1.8; fill: none; marker-end: url(#ah); }
    .dash { stroke: #000; stroke-width: 1.2; fill: none; stroke-dasharray: 5 3; marker-end: url(#ah); }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- ====== TITLE ====== -->
  <text x="390" y="22" style="font-size:15px; font-weight:bold; text-anchor:middle; fill:#000;">Конвейер сбора и подготовки данных</text>

  <!-- ====== ROW 1: EXTERNAL SOURCES ====== -->
  <text x="390" y="50" class="sm" style="font-style:italic;">Внешние источники</text>

  <rect x="10" y="60" width="150" height="55" class="src"/>
  <text x="85" y="80" class="title">MOEX ISS API</text>
  <text x="85" y="95" class="sm">Свечи OHLCV</text>
  <text x="85" y="108" class="sm">35 тикеров × 4 года</text>

  <rect x="170" y="60" width="130" height="55" class="src"/>
  <text x="235" y="80" class="title">MOEX ISS</text>
  <text x="235" y="95" class="sm">Индикаторы</text>
  <text x="235" y="108" class="sm">IMOEX, USD/RUB</text>

  <rect x="310" y="60" width="150" height="55" class="src"/>
  <text x="385" y="80" class="title">RSS: РБК, ТАСС</text>
  <text x="385" y="95" class="sm">Коммерсантъ, РИА</text>
  <text x="385" y="108" class="sm">Finam, Reuters</text>

  <rect x="470" y="60" width="140" height="55" class="src"/>
  <text x="540" y="80" class="title">Smart-Lab</text>
  <text x="540" y="95" class="sm">P/E, P/B, EV/EBITDA</text>
  <text x="540" y="108" class="sm">ROE, дивиденды</text>

  <rect x="620" y="60" width="150" height="55" class="src"/>
  <text x="695" y="80" class="title">MOEX ISS</text>
  <text x="695" y="95" class="sm">Часовые свечи</text>
  <text x="695" y="108" class="sm">48ч × 35 тикеров</text>

  <!-- ====== ARROWS: Sources → Collectors ====== -->
  <line x1="85" y1="115" x2="85" y2="168" class="arr"/>
  <line x1="235" y1="115" x2="235" y2="168" class="arr"/>
  <line x1="385" y1="115" x2="385" y2="168" class="arr"/>
  <line x1="540" y1="115" x2="540" y2="168" class="arr"/>
  <line x1="695" y1="115" x2="695" y2="168" class="arr"/>

  <!-- ====== ROW 2: COLLECTORS ====== -->
  <text x="390" y="166" class="sm" style="font-style:italic;">Модули сбора (backend/collector/)</text>

  <rect x="15" y="170" width="140" height="50" class="box"/>
  <text x="85" y="192" class="title">moex.py</text>
  <text x="85" y="206" class="sm">aiohttp + aiomoex</text>

  <rect x="165" y="170" width="140" height="50" class="box"/>
  <text x="235" y="192" class="title">macro.py</text>
  <text x="235" y="206" class="sm">ISS /engines/</text>

  <rect x="315" y="170" width="140" height="50" class="box"/>
  <text x="385" y="192" class="title">news.py</text>
  <text x="385" y="206" class="sm">FinBERT NLP</text>

  <rect x="465" y="170" width="140" height="50" class="box"/>
  <text x="535" y="192" class="title">fundamentals.py</text>
  <text x="535" y="206" class="sm">BeautifulSoup</text>

  <rect x="625" y="170" width="140" height="50" class="box"/>
  <text x="695" y="192" class="title">moex.py (1h)</text>
  <text x="695" y="206" class="sm">interval=60</text>

  <!-- ====== ARROWS: Collectors → Processing ====== -->
  <line x1="85" y1="220" x2="85" y2="268" class="arr"/>
  <line x1="235" y1="220" x2="235" y2="268" class="arr"/>
  <line x1="385" y1="220" x2="385" y2="268" class="arr"/>
  <line x1="535" y1="220" x2="535" y2="268" class="arr"/>
  <line x1="695" y1="220" x2="695" y2="268" class="arr"/>

  <!-- ====== ROW 3: PROCESSING ====== -->
  <text x="390" y="266" class="sm" style="font-style:italic;">Обработка и расчёт</text>

  <rect x="15" y="270" width="140" height="60" class="box"/>
  <text x="85" y="288" class="title">pandas_ta</text>
  <text x="25" y="303" class="sl">RSI, MACD, BB, ATR</text>
  <text x="25" y="316" class="sl">OBV, SMA, EMA</text>

  <rect x="165" y="270" width="140" height="60" class="box"/>
  <text x="235" y="288" class="title">pct_change</text>
  <text x="175" y="303" class="sl">imoex_pct</text>
  <text x="175" y="316" class="sl">usd_rub_pct</text>

  <rect x="315" y="270" width="140" height="60" class="box"/>
  <text x="385" y="288" class="title">Агрегация</text>
  <text x="325" y="303" class="sl">sentiment_1d/3d/7d</text>
  <text x="325" y="316" class="sl">news_count_1d/3d/7d</text>

  <rect x="465" y="270" width="140" height="60" class="box"/>
  <text x="535" y="288" class="title">Расчёт</text>
  <text x="475" y="303" class="sl">days_to_div, div_yield</text>
  <text x="475" y="316" class="sl">is_report_season</text>

  <rect x="625" y="270" width="140" height="60" class="box"/>
  <text x="695" y="288" class="title">Скользящие</text>
  <text x="635" y="303" class="sl">close_pct_1h/3h</text>
  <text x="635" y="316" class="sl">vol_ratio_h</text>

  <!-- ====== ARROWS: Processing → DB ====== -->
  <line x1="85" y1="330" x2="200" y2="388" class="arr"/>
  <line x1="235" y1="330" x2="300" y2="388" class="arr"/>
  <line x1="385" y1="330" x2="385" y2="388" class="arr"/>
  <line x1="535" y1="330" x2="470" y2="388" class="arr"/>
  <line x1="695" y1="330" x2="560" y2="388" class="arr"/>

  <!-- ====== ROW 4: DATABASE (Supabase) ====== -->
  <!-- DB cylinder shape -->
  <rect x="130" y="390" width="500" height="70" class="db" rx="4"/>
  <text x="380" y="415" style="font-size:14px; font-weight:bold; text-anchor:middle; fill:#000;">Supabase (PostgreSQL)</text>

  <text x="195" y="440" class="sm" style="font-weight:bold;">candles</text>
  <text x="195" y="452" class="sm">603 894</text>

  <text x="290" y="440" class="sm" style="font-weight:bold;">indicators</text>
  <text x="290" y="452" class="sm">603 894</text>

  <text x="380" y="440" class="sm" style="font-weight:bold;">macro</text>
  <text x="380" y="452" class="sm">1 144</text>

  <text x="465" y="440" class="sm" style="font-weight:bold;">news_sent.</text>
  <text x="465" y="452" class="sm">1 587</text>

  <text x="560" y="440" class="sm" style="font-weight:bold;">securities</text>
  <text x="560" y="452" class="sm">35</text>

  <!-- ====== ARROWS: DB → Feature Builder ====== -->
  <line x1="380" y1="460" x2="380" y2="498" class="arr"/>

  <!-- ====== ROW 5: FEATURE ENGINEERING ====== -->
  <rect x="130" y="500" width="500" height="55" class="box" style="stroke-width:2;"/>
  <text x="380" y="520" class="title" style="font-size:13px;">build_daily_features() + build_hourly_features()</text>
  <text x="380" y="540" class="sm">47 дневных признаков (ценовые + технические + макро + сентимент + фундамент.)</text>
  <text x="380" y="552" class="sm">+ 8 часовых признаков (close_pct_1h/3h, vol_ratio_h, hour_sin/cos, ...)</text>

  <!-- ====== ARROWS: Feature → Models ====== -->
  <line x1="255" y1="555" x2="200" y2="588" class="arr"/>
  <line x1="380" y1="555" x2="380" y2="588" class="arr"/>
  <line x1="505" y1="555" x2="560" y2="588" class="arr"/>

  <!-- ====== ROW 6: OUTPUT ====== -->
  <rect x="110" y="590" width="160" height="25" class="box"/>
  <text x="190" y="608" class="label" style="font-weight:bold;">LightGBM (w=0.50)</text>

  <rect x="300" y="590" width="160" height="25" class="box"/>
  <text x="380" y="608" class="label" style="font-weight:bold;">XGBoost (w=0.10)</text>

  <rect x="490" y="590" width="160" height="25" class="box"/>
  <text x="570" y="608" class="label" style="font-weight:bold;">LSTM+Att (w=0.40)</text>

  <!-- ====== SCHEDULE ANNOTATION ====== -->
  <rect x="650" y="390" width="120" height="50" class="box" style="stroke-dasharray:4 3;"/>
  <text x="710" y="410" class="label" style="font-weight:bold;">CRON</text>
  <text x="710" y="425" class="sm">Ежедневно</text>
  <text x="710" y="438" class="sm">09:00 MSK</text>
  <line x1="650" y1="415" x2="632" y2="415" class="dash"/>
</svg>
