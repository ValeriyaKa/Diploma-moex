<svg viewBox="0 0 780 580" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Times New Roman', 'PT Serif', Georgia, serif; }
    .tbl { fill: #fff; stroke: #000; stroke-width: 1.5; }
    .hdr { fill: #e8e8e8; stroke: #000; stroke-width: 1.5; }
    .title { font-size: 13px; font-weight: bold; text-anchor: middle; fill: #000; }
    .col { font-size: 10px; fill: #000; font-family: 'Courier New', monospace; }
    .type { font-size: 9px; fill: #555; font-family: 'Courier New', monospace; }
    .pk { font-size: 9px; fill: #000; font-weight: bold; }
    .note { font-size: 10px; fill: #000; text-anchor: middle; font-style: italic; }
    .arr { stroke: #000; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
    .fk { stroke: #000; stroke-width: 1.2; fill: none; stroke-dasharray: 5 3; marker-end: url(#ah); }
    .sm { font-size: 10px; fill: #000; text-anchor: middle; }
    .ann { font-size: 9px; fill: #000; font-style: italic; }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
    <marker id="diamond" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,5 L5,0 L10,5 L5,10 Z" fill="#fff" stroke="#000" stroke-width="1"/>
    </marker>
  </defs>

  <!-- ====== TITLE ====== -->
  <text x="390" y="22" style="font-size:15px; font-weight:bold; text-anchor:middle; fill:#000;">Схема базы данных (Supabase / PostgreSQL)</text>

  <!-- ====== TABLE: securities ====== -->
  <rect x="10" y="40" width="180" height="145" class="tbl"/>
  <rect x="10" y="40" width="180" height="22" class="hdr"/>
  <text x="100" y="56" class="title">securities</text>
  <text x="20" y="76" class="col"><tspan class="pk">PK</tspan> ticker       <tspan class="type">VARCHAR(10)</tspan></text>
  <text x="20" y="91" class="col">   short_name   <tspan class="type">VARCHAR(50)</tspan></text>
  <text x="20" y="106" class="col">   sector       <tspan class="type">VARCHAR(30)</tspan></text>
  <text x="20" y="121" class="col">   lot_size     <tspan class="type">INTEGER</tspan></text>
  <text x="20" y="136" class="col">   is_active    <tspan class="type">BOOLEAN</tspan></text>
  <text x="20" y="151" class="col">   isin         <tspan class="type">VARCHAR(12)</tspan></text>
  <text x="20" y="170" class="ann">35 эмитентов IMOEX</text>

  <!-- ====== TABLE: candles ====== -->
  <rect x="220" y="40" width="230" height="175" class="tbl"/>
  <rect x="220" y="40" width="230" height="22" class="hdr"/>
  <text x="335" y="56" class="title">candles</text>
  <text x="230" y="76" class="col"><tspan class="pk">PK</tspan> time         <tspan class="type">DATE</tspan></text>
  <text x="230" y="91" class="col"><tspan class="pk">PK</tspan> ticker       <tspan class="type">VARCHAR(10)</tspan></text>
  <text x="230" y="106" class="col"><tspan class="pk">PK</tspan> interval     <tspan class="type">VARCHAR(3)</tspan></text>
  <text x="230" y="121" class="col">   open         <tspan class="type">NUMERIC(12,4)</tspan></text>
  <text x="230" y="136" class="col">   high         <tspan class="type">NUMERIC(12,4)</tspan></text>
  <text x="230" y="151" class="col">   low          <tspan class="type">NUMERIC(12,4)</tspan></text>
  <text x="230" y="166" class="col">   close        <tspan class="type">NUMERIC(12,4)</tspan></text>
  <text x="230" y="181" class="col">   volume       <tspan class="type">BIGINT</tspan></text>
  <text x="230" y="196" class="col">   value        <tspan class="type">NUMERIC(18,2)</tspan></text>
  <text x="335" y="212" class="ann">603 894 строк</text>
  <!-- Constraint annotation -->
  <rect x="222" y="70" width="226" height="42" fill="none" stroke="#000" stroke-width="0.5" stroke-dasharray="2 2"/>
  <text x="440" y="80" class="ann">UNIQUE</text>

  <!-- ====== TABLE: indicators ====== -->
  <rect x="480" y="40" width="290" height="190" class="tbl"/>
  <rect x="480" y="40" width="290" height="22" class="hdr"/>
  <text x="625" y="56" class="title">indicators</text>
  <text x="490" y="76" class="col"><tspan class="pk">PK</tspan> time         <tspan class="type">DATE</tspan></text>
  <text x="490" y="91" class="col"><tspan class="pk">PK</tspan> ticker       <tspan class="type">VARCHAR(10)</tspan></text>
  <text x="490" y="106" class="col">   rsi_14       <tspan class="type">NUMERIC(8,4)</tspan></text>
  <text x="490" y="121" class="col">   macd_hist    <tspan class="type">NUMERIC(12,6)</tspan></text>
  <text x="490" y="136" class="col">   bb_upper     <tspan class="type">NUMERIC(12,4)</tspan></text>
  <text x="490" y="151" class="col">   bb_lower     <tspan class="type">NUMERIC(12,4)</tspan></text>
  <text x="490" y="166" class="col">   atr_14       <tspan class="type">NUMERIC(12,4)</tspan></text>
  <text x="490" y="181" class="col">   vol_ratio    <tspan class="type">NUMERIC(8,4)</tspan></text>
  <text x="490" y="196" class="col">   sma_20, ema_12 ... <tspan class="type">(ещё 9)</tspan></text>
  <text x="625" y="227" class="ann">Рассчитываются pandas_ta</text>

  <!-- ====== FK: securities → candles ====== -->
  <line x1="190" y1="80" x2="218" y2="80" class="fk"/>
  <!-- ====== FK: securities → indicators ====== -->
  <path d="M190,90 L205,90 L205,30 L470,30 L470,80 L478,80" class="fk" style="fill:none;"/>

  <!-- ====== TABLE: macro ====== -->
  <rect x="10" y="260" width="200" height="130" class="tbl"/>
  <rect x="10" y="260" width="200" height="22" class="hdr"/>
  <text x="110" y="276" class="title">macro</text>
  <text x="20" y="296" class="col"><tspan class="pk">PK</tspan> time         <tspan class="type">DATE</tspan></text>
  <text x="20" y="311" class="col">   imoex        <tspan class="type">NUMERIC(10,2)</tspan></text>
  <text x="20" y="326" class="col">   usd_rub      <tspan class="type">NUMERIC(8,4)</tspan></text>
  <text x="20" y="341" class="col">   brent        <tspan class="type">NUMERIC(8,2)</tspan></text>
  <text x="20" y="356" class="col">   key_rate     <tspan class="type">NUMERIC(5,2)</tspan></text>
  <text x="20" y="375" class="ann">   1 144 строки</text>
  <text x="110" y="388" class="ann">MOEX ISS + ЦБ РФ</text>

  <!-- ====== TABLE: news_sentiment ====== -->
  <rect x="240" y="260" width="230" height="150" class="tbl"/>
  <rect x="240" y="260" width="230" height="22" class="hdr"/>
  <text x="355" y="276" class="title">news_sentiment</text>
  <text x="250" y="296" class="col"><tspan class="pk">PK</tspan> id           <tspan class="type">SERIAL</tspan></text>
  <text x="250" y="311" class="col">   published_at <tspan class="type">TIMESTAMP</tspan></text>
  <text x="250" y="326" class="col">   source       <tspan class="type">VARCHAR(30)</tspan></text>
  <text x="250" y="341" class="col">   title        <tspan class="type">TEXT</tspan></text>
  <text x="250" y="356" class="col">   ticker       <tspan class="type">VARCHAR(10)</tspan></text>
  <text x="250" y="371" class="col">   sentiment    <tspan class="type">NUMERIC(5,4)</tspan></text>
  <text x="250" y="386" class="col">   model        <tspan class="type">VARCHAR(20)</tspan></text>
  <text x="355" y="405" class="ann">1 587 строк | FinBERT</text>

  <!-- ====== TABLE: predictions ====== -->
  <rect x="500" y="260" width="270" height="205" class="tbl"/>
  <rect x="500" y="260" width="270" height="22" class="hdr"/>
  <text x="635" y="276" class="title">predictions</text>
  <text x="510" y="296" class="col"><tspan class="pk">PK</tspan> id              <tspan class="type">SERIAL</tspan></text>
  <text x="510" y="311" class="col"><tspan class="pk">UQ</tspan> ticker           <tspan class="type">VARCHAR(10)</tspan></text>
  <text x="510" y="326" class="col"><tspan class="pk">UQ</tspan> target_date      <tspan class="type">DATE</tspan></text>
  <text x="510" y="341" class="col"><tspan class="pk">UQ</tspan> model_version    <tspan class="type">VARCHAR(20)</tspan></text>
  <text x="510" y="356" class="col">   predicted_close  <tspan class="type">NUMERIC(12,4)</tspan></text>
  <text x="510" y="371" class="col">   predicted_delta  <tspan class="type">NUMERIC(8,4)</tspan></text>
  <text x="510" y="386" class="col">   confidence       <tspan class="type">NUMERIC(5,4)</tspan></text>
  <text x="510" y="401" class="col">   signal           <tspan class="type">VARCHAR(4)</tspan></text>
  <text x="510" y="416" class="col">   actual_delta     <tspan class="type">NUMERIC(8,4)</tspan></text>
  <text x="510" y="431" class="col">   is_correct       <tspan class="type">BOOLEAN</tspan></text>
  <text x="510" y="446" class="col">   top_features     <tspan class="type">JSONB</tspan></text>
  <text x="510" y="461" class="col">   created_at       <tspan class="type">TIMESTAMPTZ</tspan></text>

  <!-- UNIQUE constraint box -->
  <rect x="502" y="305" width="266" height="42" fill="none" stroke="#000" stroke-width="0.5" stroke-dasharray="2 2"/>
  <text x="762" y="318" class="ann">UNIQUE</text>

  <!-- ====== FK arrows ====== -->
  <!-- securities.ticker → candles.ticker -->
  <!-- securities.ticker → predictions.ticker -->
  <path d="M100,185 L100,245 L540,245 L540,258" class="fk" style="fill:none;"/>
  <text x="320" y="242" class="ann">FK: ticker</text>

  <!-- ====== NOTES ====== -->
  <!-- Important details box -->
  <rect x="10" y="480" width="760" height="95" class="tbl" style="stroke-dasharray:5 3;"/>
  <text x="390" y="500" style="font-size:12px; font-weight:bold; text-anchor:middle; fill:#000;">Ключевые особенности схемы</text>

  <text x="20" y="518" class="sl">1. Составной ключ candles (time, ticker, interval) — поддержка дневных (1d) и часовых (1h) свечей в одной таблице</text>
  <text x="20" y="533" class="sl">2. UPSERT с ON CONFLICT — идемпотентная загрузка данных, повторный запуск не создаёт дубликатов</text>
  <text x="20" y="548" class="sl">3. JSONB top_features в predictions — хранение SHAP-значений без фиксированной схемы (гибкость при изменении набора признаков)</text>
  <text x="20" y="563" class="sl">4. actual_delta + is_correct — заполняются постфактум для оценки качества прогнозов (rolling backtest)</text>
</svg>
