name: train-moex-boost-errors
desc: retrain with error pattern boosting (после analyze_errors.py)

cmd: python datasphere/train_models.py --cutoff 2026-04-01 --boost-errors

cloud-instance-type: g1.1

env:
  python:
    type: manual
    version: "3.11"
    pip:
      - lightgbm==4.5.0
      - xgboost==2.1.3
      - optuna==4.1.0
      - shap==0.46.0
      - pandas==2.2.3
      - numpy==1.26.4
      - scikit-learn==1.5.2
      - torch==2.5.1+cu121
      - boto3==1.35.69
      - joblib==1.4.2
      - exchange-calendars==4.5.6
    extra-index-urls:
      - https://download.pytorch.org/whl/cu121
  vars:
    - S3_ACCESS_KEY
    - S3_SECRET_KEY
    - YC_BUCKET_NAME

inputs:
  - features.csv
  - news_sentiment.json
  - news_sentiment_historical_merged.csv
  - macro.csv
  - fundamentals.csv
  - data/error_patterns.json   # <-- паттерны ошибок из analyze_errors.py

outputs:
  - models

flags:
  - attach-project-disk
