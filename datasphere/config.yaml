name: train-moex-models
desc: train v3 with xgboost + lstm + backtest

cmd: python train_models.py --cutoff 2026-05-01

cloud-instance-types:
  - g1.1
  - g2.1

env:
  python:
    type: manual
    version: "3.11"
    pip:
      - lightgbm==4.5.0
      - xgboost==2.1.3
      - optuna==4.1.0
      - shap==0.46.0
      - pandas==2.2.3
      - numpy==1.26.4
      - scikit-learn==1.5.2
      - torch==2.5.1
      - boto3==1.35.69
      - joblib==1.4.2
  # vars not needed — S3 upload handled separately via yc CLI

inputs:
  - features.csv
  - news_sentiment.json
  - news_sentiment_historical.csv
  - news_sentiment_historical_merged.csv
  - news_finbert_historical.csv
  - macro.csv
  - fundamentals.csv

outputs:
  - models

flags:
  - attach-project-disk
